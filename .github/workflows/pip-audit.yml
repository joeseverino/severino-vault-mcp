name: pip-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Wednesday 08:11 UTC, so a fresh CVE feed catches pinned deps
    # even when nothing in the repo has changed.
    - cron: "11 8 * * 3"

permissions:
  contents: read

jobs:
  audit:
    name: Audit pinned dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Export locked requirements
        run: uv export --no-hashes --format requirements-txt > requirements-audit.txt

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements-audit.txt
          # PYSEC-2025-183: pyjwt "weak encryption" advisory. Disputed by the
          # upstream supplier (key length is the application's choice) and has
          # no fix version. pyjwt is a transitive dep of mcp's HTTP/OAuth
          # transport, unused by this stdio server. Revisit if a fix ships.
          ignore-vulns: |
            PYSEC-2025-183

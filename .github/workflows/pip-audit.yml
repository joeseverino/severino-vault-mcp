# Dependency audit — calls cordon's reusable pip-audit workflow, so the plumbing
# (uv setup, locked-requirements export, the official pypa action + SARIF) lives
# once in cordon, not here. This file owns only the triggers and this repo's
# advisory ignores. A weekly scan catches a newly-disclosed CVE against unchanged
# pins — the reason dependency auditing is a scheduled workflow, not a cordon
# check (a check runs on a change; this runs on a timer).
name: pip-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Wednesday 08:11 UTC, so a fresh CVE feed catches pinned deps
    # even when nothing in the repo has changed.
    - cron: "11 8 * * 3"

permissions:
  contents: read

jobs:
  audit:
    uses: joeseverino/cordon/.github/workflows/pip-audit.yml@main
    with:
      # PYSEC-2025-183: pyjwt "weak encryption" advisory. Disputed by the
      # upstream supplier (key length is the application's choice) and has no
      # fix version. pyjwt is a transitive dep of mcp's HTTP/OAuth transport,
      # unused by this stdio server. Revisit if a fix ships.
      ignore-vulns: PYSEC-2025-183

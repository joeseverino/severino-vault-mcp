name: pip-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Wednesday 08:11 UTC, so a fresh CVE feed catches pinned deps
    # even when nothing in the repo has changed.
    - cron: "11 8 * * 3"

permissions:
  contents: read

jobs:
  audit:
    name: Audit pinned dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Export locked requirements
        run: uv export --no-hashes --format requirements-txt > requirements-audit.txt

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements-audit.txt

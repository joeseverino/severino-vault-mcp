name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install ripgrep (search_body needs it)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run tests
        run: uv run pytest -q

      - name: Smoke test installed package
        run: |
          uv sync --extra dev --no-editable
          uv run --no-sync python -c "import severino_vault_mcp; print(severino_vault_mcp.__version__)"
          SVMC_VAULT_PATH=examples/sample-vault uv run --no-sync severino-vault-mcp doctor

  # The standardized gate, abstracted to one place: this calls cordon's reusable
  # gate, which runs the checks engine over our cordon.checks.json (ruff + pytest
  # + pip-audit) folded with cordon's built-in invariants. All the CI plumbing —
  # checkout, uv/node setup, pinned SHAs — lives once in cordon, not here. The
  # `test` matrix above stays for multi-version coverage; this is the single
  # standardized check (`cordon / gate`). Pinned to the gate's branch until it
  # lands on cordon's main; switch the ref to @main after that merge.
  cordon:
    uses: joeseverino/cordon/.github/workflows/cordon-gate.yml@main

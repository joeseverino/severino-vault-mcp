name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ripgrep (search_body needs it)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run tests
        run: uv run pytest -q

      - name: Smoke test installed package
        run: |
          uv sync --extra dev --no-editable
          uv run --no-sync python -c "import severino_vault_mcp; print(severino_vault_mcp.__version__)"
          SVMC_VAULT_PATH=examples/sample-vault uv run --no-sync severino-vault-mcp doctor

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # The whole CI surface is cordon's reusable gate: it runs the checks engine over
  # this repo, auto-detecting the uv stack and running ruff, pytest (across the
  # Python versions in [project].classifiers), version alignment, and the
  # built-wheel import smoke — folded with cordon's repo invariants into one
  # verdict. All the CI plumbing — checkout, uv/node setup, ripgrep, pinned SHAs —
  # lives once in cordon, not here. Multi-version coverage and the installed-
  # package smoke used to be a bespoke matrix job in this file; both are now
  # standard catalog checks, so this repo carries no CI of its own. Dependency
  # auditing is the scheduled pip-audit.yml. The single required check: `cordon / gate`.
  cordon:
    uses: joeseverino/cordon/.github/workflows/cordon-gate.yml@main
